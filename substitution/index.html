<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Substitution Cracker</title>
  <link href="../assets/generalStyle.css" rel="stylesheet" type="text/css"/>
</head>
<body>
  <script src="../assets/generalScript.js"></script>
  <script src="script.js"></script>

  <section class="tool-section">
    <form autocomplete="off" name="evolutionForm">
      <textarea name="message" rows="8" placeholder="Enter encrypted text here..." id="evolutionMessage"></textarea>
      
      <div class="parameters">
        <label for="ngramSelect">N-Gram Scoring:</label>
        <select id="ngramSelect">
          <option value="1">Monograms (1-gram)</option>
          <option value="2">Bigrams (2-gram)</option>
          <option value="3">Trigrams (3-gram)</option>
          <option value="4" selected>Quadgrams (4-gram)</option>
        </select>
      </div>

      <div class="actions">
        <button type="button" id="startEvolutionButton">CRACK</button>
        <button type="button" id="stopEvolutionButton" disabled>STOP</button>
        <button type="button" id="testTextButton">TEST TEXT</button>
      </div>
    </form>
    
    <div id="bestDecryption"></div>
    <ul class="striped keepSpacing" id="evolutionResult"></ul>
  </section>
</body>
</html>
