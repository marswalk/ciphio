<!DOCTYPE html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Vigenere Cracker</title>
  <link href="style.css" rel="stylesheet" type="text/css"/>
  <link href="assets/generalStyle.css" rel="stylesheet" type="text/css"/>
</head>
<body>
  <script src="assets/generalScript.js"></script>
  <script src="script.js"></script>

  <noscript>
    <div id="noscriptAlert">
      <p>You don't have <em>javascript</em> enabled for this webpage. All of the tools on this website require javascript to function, so we recommend that you <a href="https://www.enable-javascript.com">turn it on.</a></p>
    </div>
  </noscript>

  <header>
    <h3><a href="">CIPHIO BY MARSWALK</a></h3>
    <ul>
      <li><a href="">TRANSPOSITION</a></li>
      <li><a href="">VIGENERE</a></li>
      <li><a href="../affine/index.html">AFFINE</a></li>
      <li><a href="">SUBSTITUTION</a></li>
    </ul>
  </header>

  <section id="landing">
    <h1 id="title"><noscript>Vigenere Cipher</noscript></h1>
    <h2 id="subtitle"><noscript>Cracking by Marswalk in Belgium :)</noscript></h2>
  </section>

  <section id="evolutionSection">
    <a class="anchor" id="evolutionaryAlgorithm"></a>
    <h2>Vigenere Cracker with Key Length Guesser</h2>
    <form autocomplete="off" name="evolutionForm">
      <p>Message:</p>
      <textarea name="message" rows="15" cols="80" id="evolutionMessage"></textarea><br>

      <div style="margin-bottom: 16px;">
        <label for="ngramSelect" style="color: var(--text-muted); font-family: 'Inter', sans-serif;">N-Gram Scoring:</label>
        <select id="ngramSelect" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: var(--text-main); padding: 8px 12px; border-radius: 6px; font-family: 'Inter', sans-serif; margin-left: 8px; margin-right: 16px; outline: none;">
          <option value="1">Monograms (1-gram)</option>
          <option value="2" selected>Bigrams (2-gram)</option>
          <option value="3">Trigrams (3-gram)</option>
          <option value="4">Quadgrams (4-gram)</option>
        </select>
      </div>

      <button type="button" id="startEvolutionButton">CRACK</button>
      <button type="button" id="stopEvolutionButton" disabled>STOP</button>
      <button type="button" id="testTextButton" style="background: rgba(255,255,255,0.1); margin-left: 20px;">INSERT TEST TEXT</button><br>
      <span style="display:inline-block; margin-top:10px;">
        <input type="checkbox" name="keylengthbox" id="checker">
        <label for="checker"> Known key length </label>
        <input type="number" value="10" min="2" max="5000" size="4" name="keylengthbox" id="keylengthbox">
      </span>
    </form>
    <h5>BEST CRACKED TEXT</h5>
    <p class="keepSpacing">Key Length: <x id="bestKeyLengthFound"> </x> Key: <x id="bestKey"> </x> Time lapsed: <x id="bestKeyTimeFound"> </x></p>
    <p id="bestDecryption"></p>
    <ul class="striped keepSpacing" id="evolutionResult"></ul>
  </section>
</body>
</html>
